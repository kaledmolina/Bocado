services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bocado_web
    ports:
      - "8000:80"
    environment:
      - APP_NAME="bocado!"
      - APP_ENV=production
      - APP_KEY=base64:0QJjC5mKGNhN9hk/U1AAvGgKYIDiPWp40f/YsU7dOEU=
      - APP_DEBUG=false
      - APP_URL=https://bocado.click
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bocado
      - DB_USERNAME=bocado_user
      - DB_PASSWORD=bocado_password
      - SESSION_DRIVER=database
      - SESSION_LIFETIME=120
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: bocado_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=bocado
      - MYSQL_USER=bocado_user
      - MYSQL_PASSWORD=bocado_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - ./mysql_data:/var/lib/mysql
